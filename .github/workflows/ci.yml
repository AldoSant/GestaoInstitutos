name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://instituto:instituto-ci@localhost:5432/instituto_folha
      DATABASE_SSL: "false"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: instituto_folha
          POSTGRES_USER: instituto
          POSTGRES_PASSWORD: instituto-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U instituto -d instituto_folha"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Dependency audit
        run: npm audit

      - name: Migration consistency
        run: npm run db:check

      - name: Deployment configuration
        env:
          POSTGRES_PASSWORD: ci-compose-password
          AUTH_SECRET: ci-compose-secret-with-at-least-32-bytes
        run: |
          docker compose config > /dev/null
          sh -n scripts/ops/backup-postgres.sh
          sh -n scripts/ops/verificar-restauracao-postgres.sh

      - name: Database migrations
        run: npm run db:migrate

      - name: Bootstrap test organization
        run: >-
          npm run db:bootstrap:empresa --
          --cnpj 99999999000191
          --razao-social "Organização sintética da CI"

      - name: Bootstrap fiscal rules
        run: npm run db:bootstrap:regras

      - name: Worker queue smoke test
        shell: bash
        run: |
          npm run worker:start > /tmp/gestao-institutos-worker.log 2>&1 &
          WORKER_PID=$!
          trap 'kill $WORKER_PID 2>/dev/null || true' EXIT
          npm run worker:validar-regra -- 2026-06
          for attempt in $(seq 1 20); do
            if grep -q "VALIDAR_REGRA_FISCAL) concluída" /tmp/gestao-institutos-worker.log; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/gestao-institutos-worker.log
          exit 1

      - name: GIW import chain and idempotency
        shell: bash
        run: |
          for snapshot in tests/fixtures/giw/*.json; do
            npm run giw:importar -- --arquivo "$snapshot" --aplicar
          done
          for snapshot in tests/fixtures/giw/*.json; do
            npm run giw:importar -- --arquivo "$snapshot" --aplicar
          done

      - name: Lint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Runtime smoke test
        run: |
          npm start > /tmp/gestao-institutos.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://localhost:3000/api/health > /dev/null; then
              curl --fail --silent http://localhost:3000/ > /dev/null
              curl --fail --silent http://localhost:3000/folhas > /dev/null
              curl --fail --silent http://localhost:3000/cadastros > /dev/null
              curl --fail --silent http://localhost:3000/prestadores > /dev/null
              curl --fail --silent http://localhost:3000/instrumentos > /dev/null
              curl --fail --silent http://localhost:3000/vinculos > /dev/null
              curl --fail --silent http://localhost:3000/eventos > /dev/null
              exit 0
            fi
            sleep 1
          done
          cat /tmp/gestao-institutos.log
          exit 1

      - name: Container images
        run: |
          docker build --target migrator -t gestao-institutos-migrator:ci .
          docker build --target worker -t gestao-institutos-worker:ci .
          docker build --target runner -t gestao-institutos-web:ci .
